<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartGrid - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .register-card { background: #1e1e1e; padding: 40px; border-radius: 15px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background: #2c2c2c; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="register-card">
        <h2 class="text-center fw-bold mb-4">Create Account</h2>
        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Register Now</button>
            <div class="text-center">
                <a href="/login" class="text-info text-decoration-none small">Already have an account? Login</a>
            </div>
        </form>
    </div>

</body>
</html>
