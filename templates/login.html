<!DOCTYPE html>
<html>
<head>
    <title>SmartGrid Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .login-card { background: #1e1e1e; border: none; border-radius: 15px; width: 380px; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card login-card shadow-lg p-4">
        <h3 class="text-center fw-bold mb-4">Secure Login</h3>
        
        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <p class="text-muted small">Don't have an account?</p>
            <a href="/register" class="btn btn-outline-info btn-sm w-100 rounded-pill">Create New Account</a>
        </div>
    </div>

</body>
</html>
